<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>CorteCloud Local</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Ferramenta local para otimização de planos de corte e módulos de móveis.">
  <meta name="theme-color" content="#1e3a8a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1e3a8a',
            'primary-light': '#2563eb',
            secondary: '#3b82f6',
            accent: '#f59e0b',
            surface: '#f1f5f9',
            card: '#ffffff',
          }
        }
      }
    }
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-surface text-gray-800 min-h-screen flex flex-col pb-20 md:pb-0">

  <!-- Top bar (mobile: slim, desktop: full) -->
  <header class="bg-primary text-white shadow-lg sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="#/" class="text-lg md:text-xl font-bold tracking-tight flex items-center gap-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/>
        </svg>
        CorteCloud
      </a>
      <!-- Desktop nav -->
      <div class="hidden md:flex gap-1" id="nav-links-desktop">
        <a href="#/corte" class="nav-link px-4 py-2 rounded-lg text-sm font-medium hover:bg-white/20 transition">
          Plano de Corte
        </a>
        <a href="#/modulos" class="nav-link px-4 py-2 rounded-lg text-sm font-medium hover:bg-white/20 transition">
          Módulos
        </a>
        <a href="#/projetos" class="nav-link px-4 py-2 rounded-lg text-sm font-medium hover:bg-white/20 transition">
          Projetos
        </a>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main id="app" class="flex-1 max-w-7xl mx-auto w-full px-3 md:px-6 py-4 md:py-6">
  </main>

  <!-- Mobile bottom navigation -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-50 safe-area-bottom">
    <div class="flex justify-around py-1">
      <a href="#/corte" class="bottom-nav-link flex flex-col items-center py-2 px-3 text-gray-400" data-route="/corte">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/>
        </svg>
        <span class="text-[10px] mt-0.5 font-medium">Corte</span>
      </a>
      <a href="#/modulos" class="bottom-nav-link flex flex-col items-center py-2 px-3 text-gray-400" data-route="/modulos">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
        <span class="text-[10px] mt-0.5 font-medium">Módulos</span>
      </a>
      <a href="#/projetos" class="bottom-nav-link flex flex-col items-center py-2 px-3 text-gray-400" data-route="/projetos">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
        </svg>
        <span class="text-[10px] mt-0.5 font-medium">Projetos</span>
      </a>
    </div>
  </nav>

  <!-- Toast container -->
  <div id="toast-container" class="fixed bottom-24 md:bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
