<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>CorteCloud Local</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ferramenta local para otimização de planos de corte e módulos 3D de móveis.">
  <meta name="theme-color" content="#1e3a8a">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1e3a8a',
            'primary-light': '#2563eb',
            secondary: '#3b82f6',
            accent: '#f59e0b',
            surface: '#f8fafc',
            card: '#ffffff',
          }
        }
      }
    }
  </script>

  <!-- Three.js via importmap -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-surface text-gray-800 min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-primary text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="#/" class="text-xl font-bold tracking-tight flex items-center gap-2">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/>
        </svg>
        CorteCloud Local
      </a>
      <div class="flex gap-1" id="nav-links">
        <a href="#/corte" class="nav-link px-4 py-2 rounded-lg text-sm font-medium hover:bg-white/20 transition">
          Plano de Corte
        </a>
        <a href="#/modulos" class="nav-link px-4 py-2 rounded-lg text-sm font-medium hover:bg-white/20 transition">
          Módulos 3D
        </a>
        <a href="#/projetos" class="nav-link px-4 py-2 rounded-lg text-sm font-medium hover:bg-white/20 transition">
          Projetos
        </a>
      </div>
    </div>
  </nav>

  <!-- Main content area -->
  <main id="app" class="flex-1 max-w-7xl mx-auto w-full px-4 py-6">
    <!-- Content injected by router -->
  </main>

  <!-- Toast container -->
  <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2"></div>

  <!-- App entry point -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
